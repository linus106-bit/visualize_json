<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM 답변 비교기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5f6b7a;
      --border: #d7deea;
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .meta { color: var(--muted); margin: 0 0 10px 0; }
    .question { margin: 6px 0; }
    .model-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 12px;
      overflow-x: auto;
      align-items: stretch;
    }
    .model-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .model-name {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }
    .label {
      font-size: 12px;
      color: var(--muted);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .answer {
      white-space: pre-wrap;
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      margin: 0;
      flex: 1;
    }
  </style>
</head>
<body>
  <h1>LLM 답변 비교 웹페이지</h1>

  {% for session in sessions %}
  <div class="panel">
    <p class="meta">세션 {{ session.sessionNumber }}</p>
    <p class="question">Q(EN): {{ session.question }}</p>
    <p class="question">Q(KO): {{ session.questionKorean }}</p>
    <div class="model-grid">
      {% for model in session.models %}
      <div class="model-card">
        <p class="model-name">{{ model.name }}</p>
        <p class="label">Original</p>
        <p class="answer">{{ model.original }}</p>
        <p class="label">Korean</p>
        <p class="answer">{{ model.korean }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</body>
</html>
